<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 카페 - 살인마의 암실</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background: #000;
            overflow: hidden;
            cursor: default;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Popup Overlay */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .popup-overlay.active {
            display: flex;
        }

        .popup {
            background: #1a1a1a;
            border: 3px solid #ffff00;
            border-radius: 10px;
            padding: 40px;
            max-width: 700px;
            color: #fff;
            animation: popupIn 0.4s ease-out;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes popupIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .popup h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #ffff00;
            text-align: center;
        }

        .popup-content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #aaa;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #333;
            border: 2px solid #666;
            color: #fff;
            border-radius: 5px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #ffff00;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .submit-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            background: #00aa00;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #00dd00;
        }

        .cancel-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            background: #666;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: #888;
        }

        .error-message {
            color: #ff4444;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: #44ff44;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .hint-box {
            background: #2a2a2a;
            border-left: 3px solid #ffaa00;
            padding: 15px;
            margin: 15px 0;
            border-radius: 3px;
        }

        .hint-box strong {
            color: #ffaa00;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin: 15px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            border-radius: 3px;
            font-size: 12px;
        }

        .calendar-day.marked {
            background: #ff0000;
            color: #fff;
            font-weight: bold;
        }

        .dial-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .dial {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dial-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffff00;
            width: 50px;
            text-align: center;
            height: 30px;
            line-height: 30px;
            background: #222;
            border: 2px solid #666;
            border-radius: 3px;
        }

        .dial-btn {
            padding: 5px 10px;
            font-size: 14px;
            background: #333;
            border: 1px solid #666;
            color: #fff;
            cursor: pointer;
            border-radius: 3px;
            width: 50px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
            max-width: 250px;
            margin-left: auto;
            margin-right: auto;
        }

        .numpad button {
            aspect-ratio: 1;
            font-size: 20px;
            font-weight: bold;
            background: #333;
            border: 2px solid #666;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .numpad button:hover {
            background: #555;
            border-color: #ffff00;
        }

        .numpad button:active {
            transform: scale(0.9);
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 20px 0;
        }

        .keyboard button {
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            background: #333;
            border: 2px solid #666;
            color: #fff;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .keyboard button:hover {
            background: #555;
            border-color: #ffff00;
        }

        .periodic-table {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            margin: 15px 0;
            font-size: 13px;
        }

        .periodic-table div {
            margin: 5px 0;
            padding: 5px;
            background: #333;
            border-radius: 3px;
        }

        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 10px #ff4444;
            z-index: 150;
        }

        .ending-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 400;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .ending-screen.active {
            display: flex;
        }

        .ending-text {
            font-size: 60px;
            color: #44ff44;
            font-weight: bold;
            text-shadow: 0 0 20px #44ff44;
            margin-bottom: 40px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .ending-button {
            padding: 20px 40px;
            font-size: 24px;
            border: 2px solid #44ff44;
            background: transparent;
            color: #44ff44;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .ending-button:hover {
            background: #44ff44;
            color: #000;
            box-shadow: 0 0 20px #44ff44;
        }

        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 350;
            transition: opacity 0.75s ease;
        }

        .fade-overlay.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="timer" id="timer"></div>
    <div id="fadeOverlay" class="fade-overlay"></div>
    
    <div id="popupOverlay" class="popup-overlay">
        <div id="popup" class="popup"></div>
    </div>

    <div id="endingScreen" class="ending-screen">
        <div class="ending-text" id="endingText">🎉 탈출 성공! 🎉</div>
        <button class="ending-button" onclick="location.reload()">다시 시작</button>
    </div>

    <script>
        // ============================================
        // GAME STATE & CONFIG
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const gameState = {
            scene: 'TITLE',
            uvMode: false,
            isTransitioning: false,
            hoverTarget: null,
            hoverNotice: '',
            hoverNoticeUntil: 0,
            timeRemaining: 600, // 10분
            gameStartTime: null,
            solvedPuzzles: {
                pc: false,
                cabinet: false,
                safe: false,
                door: false
            },
            obtainedItems: {
                pcDocument: false,
                cabinetMemo: false,
                safeKey: false,
                photoEvidence: []
            }
        };

        const mouseState = {
            x: -1,
            y: -1
        };

        function pointInRect(px, py, rect) {
            return px > rect.x && px < rect.x + rect.w && py > rect.y && py < rect.y + rect.h;
        }

        function findTitleHoverTarget() {
            return window.buttonCoords?.find(btn => pointInRect(mouseState.x, mouseState.y, btn)) || null;
        }

        function findPosterHoverTarget() {
            return window.posterCoords?.find(
                poster => mouseState.x > poster.x - 80 && mouseState.x < poster.x + 80 &&
                    mouseState.y > poster.y - 120 && mouseState.y < poster.y + 120
            ) || null;
        }

        function updateCanvasCursor() {
            let interactive = false;
            if (gameState.scene === 'TITLE') {
                interactive = !!findTitleHoverTarget();
            } else if (gameState.scene === 'THEME_SELECT') {
                interactive = !!findPosterHoverTarget();
            } else if (gameState.scene === 'MAIN_GAME') {
                const coords = {
                    calendar: window.calendarCoords,
                    pc: window.pcCoords,
                    cabinet: window.cabinetCoords,
                    safe: window.safeCoords,
                    door: window.doorCoords,
                    switch: window.switchCoords
                };
                interactive = Object.values(coords).some(rect => rect && pointInRect(mouseState.x, mouseState.y, rect));
            }
            canvas.style.cursor = interactive ? 'pointer' : 'default';
        }

        function startSceneTransition(nextScene, callback) {
            if (gameState.isTransitioning) {
                return;
            }
            gameState.isTransitioning = true;
            const overlay = document.getElementById('fadeOverlay');
            overlay.classList.add('active');

            setTimeout(() => {
                gameState.scene = nextScene;
                if (callback) {
                    callback();
                }
                setTimeout(() => {
                    overlay.classList.remove('active');
                    gameState.isTransitioning = false;
                }, 300);
            }, 750);
        }

        function showThemeInfoPopup() {
            const content = `
                <h2>Case 01: 살인마의 암실</h2>
                <div class="popup-content">
                    연쇄 살인마의 암실에 갇힌 형사가 되어 제한 시간 안에 단서를 조합해 탈출해야 합니다.<br><br>
                    난이도: <strong style="color:#ff4444;">상</strong><br>
                    예상 플레이타임: 10분
                </div>
                <div class="button-group">
                    <button class="submit-btn" onclick="startSelectedTheme()">테마 시작</button>
                    <button class="cancel-btn" onclick="closePopup()">뒤로 가기</button>
                </div>
            `;
            showPopup(content);
        }

        function startSelectedTheme() {
            closePopup();
            startSceneTransition('MAIN_GAME', () => {
                gameState.gameStartTime = null;
                gameState.timeRemaining = 600;
            });
        }

        function showSettingsPopup() {
            const content = `
                <h2>환경설정</h2>
                <div class="popup-content">
                    사운드와 난이도는 현재 데모 고정값으로 동작합니다.<br><br>
                    볼륨: 30%<br>
                    난이도: 상급<br>
                    사운드: ON
                </div>
                <button class="cancel-btn" onclick="closePopup()">닫기</button>
            `;
            showPopup(content);
        }

        function showExitPopup() {
            const content = `
                <h2>퇴근</h2>
                <div class="popup-content">
                    오늘의 영업을 종료하시겠습니까?<br><br>
                    종료를 선택하면 타이틀 화면에 머무른 채 안내 문구를 표시합니다.
                </div>
                <div class="button-group">
                    <button class="submit-btn" onclick="confirmExit()">종료</button>
                    <button class="cancel-btn" onclick="closePopup()">취소</button>
                </div>
            `;
            showPopup(content);
        }

        function confirmExit() {
            closePopup();
            gameState.hoverNotice = '이 브라우저에서는 스크립트로 창을 닫을 수 없습니다.';
            gameState.hoverNoticeUntil = Date.now() + 2200;
        }

        // ============================================
        // DRAWING FUNCTIONS - TITLE SCENE
        // ============================================
        function drawTitleScene() {
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#0a0a0a');
            bgGrad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Neon sign effect
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 40;
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('방탈출 카페', canvas.width / 2, 150);
            ctx.shadowBlur = 0;

            // Counter visual
            ctx.fillStyle = '#5a4a3a';
            ctx.fillRect(canvas.width / 2 - 200, 300, 400, 150);
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 3;
            ctx.strokeRect(canvas.width / 2 - 200, 300, 400, 150);

            // Menu buttons
            const buttons = [
                { y: 400, text: '[테마 입장]' },
                { y: 480, text: '[환경설정]' },
                { y: 560, text: '[퇴근]' }
            ];

            const hoveredButton = findTitleHoverTarget();

            buttons.forEach(btn => {
                const isHover = hoveredButton && hoveredButton.y === btn.y - 30;
                ctx.fillStyle = isHover ? '#00ffff' : '#fff';
                ctx.font = `bold ${isHover ? 31 : 28}px Arial`;
                if (isHover) {
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 12;
                }
                ctx.textAlign = 'center';
                ctx.fillText(btn.text, canvas.width / 2, btn.y);
                if (isHover) {
                    ctx.shadowBlur = 0;
                }
            });

            window.buttonCoords = buttons.map((btn, i) => ({
                x: canvas.width / 2 - 100,
                y: btn.y - 30,
                w: 200,
                h: 50,
                action: i === 0 ? 'THEME_SELECT' : i === 1 ? 'SETTINGS' : 'EXIT'
            }));
        }

        // ============================================
        // DRAWING FUNCTIONS - THEME SELECT SCENE
        // ============================================
        function drawThemeSelectScene() {
            const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bgGrad.addColorStop(0, '#0a0a0a');
            bgGrad.addColorStop(1, '#2a2a2a');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Wall texture
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('테마 선택', canvas.width / 2, 80);

            // Posters
            const posters = [
                { x: 250, y: 300, locked: false, title: '살인마의 암실', case: '01' },
                { x: canvas.width / 2, y: 300, locked: true, title: '????', case: '02' },
                { x: canvas.width - 250, y: 300, locked: true, title: '????', case: '03' }
            ];

            const hoveredPoster = findPosterHoverTarget();

            posters.forEach((poster, idx) => {
                ctx.save();
                const isHover = hoveredPoster && hoveredPoster.case === poster.case;
                const shake = poster.locked && isHover ? Math.sin(Date.now() / 35) * 5 : 0;
                const scale = !poster.locked && isHover ? 1.05 : 1;
                ctx.translate(poster.x + shake, poster.y);
                ctx.scale(scale, scale);
                ctx.translate(-poster.x, -poster.y);

                const frameColor = poster.locked ? '#666' : '#ffff00';
                ctx.strokeStyle = frameColor;
                ctx.lineWidth = 3;
                ctx.fillStyle = poster.locked ? '#333' : '#222';
                ctx.fillRect(poster.x - 80, poster.y - 120, 160, 240);
                ctx.strokeRect(poster.x - 80, poster.y - 120, 160, 240);

                if (poster.locked) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(poster.x - 80, poster.y - 120, 160, 240);
                    ctx.fillStyle = '#ff6666';
                    ctx.font = 'bold 15px Arial';
                    ctx.fillText('LOCKED', poster.x, poster.y + 12);
                } else {
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = isHover ? 34 : 20;
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                    ctx.fillRect(poster.x - 80, poster.y - 120, 160, 240);
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = poster.locked ? '#666' : '#ffff00';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Case ' + poster.case, poster.x, poster.y - 80);
                ctx.font = '14px Arial';
                ctx.fillStyle = poster.locked ? '#555' : '#fff';
                ctx.fillText(poster.title, poster.x, poster.y + 80, 160);

                ctx.restore();
            });

            if (gameState.hoverNoticeUntil > Date.now()) {
                ctx.fillStyle = '#ff6666';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(gameState.hoverNotice, canvas.width / 2, canvas.height - 40);
            }

            window.posterCoords = posters;
        }

        // ============================================
        // DRAWING FUNCTIONS - MAIN GAME SCENE
        // ============================================
        function drawMainGameScene() {
            // Room background
            drawRoomBackground();
            drawRoomObjects();
        }

        function drawRoomBackground() {
            const ceilingColor = gameState.uvMode ? '#1a1a3a' : '#3a3a2a';
            const wallColor = gameState.uvMode ? '#0a0a2a' : '#2a2416';
            const floorColor = gameState.uvMode ? '#05051a' : '#1a1a10';

            // Ceiling
            const ceilingGrad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            ceilingGrad.addColorStop(0, '#1a1a1a');
            ceilingGrad.addColorStop(0.5, ceilingColor);
            ceilingGrad.addColorStop(1, '#1a1a1a');
            ctx.fillStyle = ceilingGrad;
            ctx.fillRect(0, 0, canvas.width, 80);

            // Walls
            const wallGrad = ctx.createLinearGradient(0, 80, 0, canvas.height * 0.7);
            wallGrad.addColorStop(0, 'rgba(255, 255, 255, 0.02)');
            wallGrad.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = wallColor;
            ctx.fillRect(0, 80, canvas.width, canvas.height * 0.6);
            ctx.fillStyle = wallGrad;
            ctx.fillRect(0, 80, canvas.width, canvas.height * 0.6);

            // Floor
            ctx.fillStyle = floorColor;
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.height * 0.3; i += 15) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height * 0.7 + i);
                ctx.lineTo(canvas.width, canvas.height * 0.7 + i);
                ctx.stroke();
            }
        }

        function drawRoomObjects() {
            // Cabinet (좌측)
            drawCabinet();
            // PC Desk (중앙)
            drawPCDesk();
            // Calendar
            drawCalendar();
            // Light Switch
            drawLightSwitch();
            // Safe (우측)
            drawSafe();
            // Door
            drawDoor();
            // Photos
            drawPhotos();
            // Magic square (UV모드)
            if (gameState.uvMode) {
                drawMagicSquare();
            }

            // UI
            ctx.fillStyle = gameState.uvMode ? '#00ff00' : '#ffaa00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('💡 ' + (gameState.uvMode ? 'UV 블랙라이트' : '적색등'), 20, 30);
            ctx.fillText('🔓 풀린 퍼즐: ' + Object.values(gameState.solvedPuzzles).filter(v => v).length + '/4', 20, 60);
        }

        function drawCabinet() {
            const x = 100, y = 180;
            const cabinetGrad = ctx.createLinearGradient(x, y, x + 120, y);
            cabinetGrad.addColorStop(0, '#5a5a5a');
            cabinetGrad.addColorStop(0.5, '#3a3a3a');
            cabinetGrad.addColorStop(1, '#2a2a2a');
            ctx.fillStyle = cabinetGrad;
            ctx.fillRect(x, y, 120, 200);
            
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, 120, 200);

            // Shelves
            for (let i = 1; i < 4; i++) {
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + 5, y + (200 / 4) * i);
                ctx.lineTo(x + 115, y + (200 / 4) * i);
                ctx.stroke();
            }

            const lockColor = gameState.solvedPuzzles.cabinet ? '#00ff00' : '#ff0000';
            ctx.fillStyle = lockColor;
            ctx.beginPath();
            ctx.arc(x + 60, y + 100, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowColor = lockColor;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowColor = 'transparent';

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('화학약품 캐비닛', x + 60, y + 240);

            window.cabinetCoords = { x, y, w: 120, h: 200 };
        }

        function drawPCDesk() {
            const x = canvas.width / 2 - 80, y = 180;
            
            const deskGrad = ctx.createLinearGradient(x, y, x, y + 120);
            deskGrad.addColorStop(0, '#6a5a4a');
            deskGrad.addColorStop(1, '#4a3a2a');
            ctx.fillStyle = deskGrad;

        function updateTimer() {
            const timerEl = document.getElementById('timer');
            
            if (gameState.gameStartTime === null && gameState.scene === 'MAIN_GAME') {
                gameState.gameStartTime = Date.now();
            }

            if (gameState.gameStartTime !== null) {
                const elapsed = Math.floor((Date.now() - gameState.gameStartTime) / 1000);
                gameState.timeRemaining = Math.max(0, 600 - elapsed);

                const minutes = Math.floor(gameState.timeRemaining / 60);
                const seconds = gameState.timeRemaining % 60;
                timerEl.textContent = `⏱️ ${minutes}:${seconds.toString().padStart(2, '0')}`;

                if (gameState.timeRemaining === 0) {
                    showGameOver();
                }
            }
        }

        // ============================================
        // MOUSE INTERACTION
        // ============================================
        canvas.addEventListener('click', (e) => {
            if (gameState.isTransitioning) {
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (gameState.scene === 'TITLE') {
                window.buttonCoords?.forEach(btn => {
                    if (x > btn.x && x < btn.x + btn.w && y > btn.y && y < btn.y + btn.h) {
                        if (btn.action === 'THEME_SELECT') {
                            startSceneTransition('THEME_SELECT');
                        } else if (btn.action === 'SETTINGS') {
                            showSettingsPopup();
                        } else if (btn.action === 'EXIT') {
                            showExitPopup();
                        }
                    }
                });
            } else if (gameState.scene === 'THEME_SELECT') {
                window.posterCoords?.forEach((poster, idx) => {
                    const isHit = x > poster.x - 80 && x < poster.x + 80 &&
                        y > poster.y - 120 && y < poster.y + 120;
                    if (isHit && !poster.locked) {
                        showThemeInfoPopup();
                    } else if (isHit && poster.locked) {
                        gameState.hoverNotice = '아직 잠긴 테마입니다.';
                        gameState.hoverNoticeUntil = Date.now() + 1200;
                    }
                });
            } else if (gameState.scene === 'MAIN_GAME') {
                const coords = {
                    calendar: window.calendarCoords,
                    pc: window.pcCoords,
                    cabinet: window.cabinetCoords,
                    safe: window.safeCoords,
                    door: window.doorCoords,
                    switch: window.switchCoords
                };

                if (coords.calendar && x > coords.calendar.x && x < coords.calendar.x + coords.calendar.w &&
                    y > coords.calendar.y && y < coords.calendar.y + coords.calendar.h) {
                    showCalendarPuzzle();
                } else if (coords.pc && x > coords.pc.x && x < coords.pc.x + coords.pc.w &&
                    y > coords.pc.y && y < coords.pc.y + coords.pc.h) {
                    showPCPuzzle();
                } else if (coords.cabinet && x > coords.cabinet.x && x < coords.cabinet.x + coords.cabinet.w &&
                    y > coords.cabinet.y && y < coords.cabinet.y + coords.cabinet.h) {
                    showCabinetPuzzle();
                } else if (coords.safe && x > coords.safe.x && x < coords.safe.x + coords.safe.w &&
                    y > coords.safe.y && y < coords.safe.y + coords.safe.h) {
                    showSafePuzzle();
                } else if (coords.door && x > coords.door.x && x < coords.door.x + coords.door.w &&
                    y > coords.door.y && y < coords.door.y + coords.door.h) {
                    showDoorPuzzle();
                } else if (coords.switch && x > coords.switch.x && x < coords.switch.x + coords.switch.w &&
                    y > coords.switch.y && y < coords.switch.y + coords.switch.h) {
                    gameState.uvMode = !gameState.uvMode;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseState.x = e.clientX - rect.left;
            mouseState.y = e.clientY - rect.top;
        });

        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) {
                closePopup();
            }
        });

        // ============================================
        // MAIN GAME LOOP
        // ============================================
        function gameLoop() {
            if (gameState.scene === 'TITLE') {
                drawTitleScene();
            } else if (gameState.scene === 'THEME_SELECT') {
                drawThemeSelectScene();
            } else if (gameState.scene === 'MAIN_GAME') {
                drawMainGameScene();
            }

            updateTimer();
            updateCanvasCursor();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        gameLoop();
    </script>
</body>
</html>
